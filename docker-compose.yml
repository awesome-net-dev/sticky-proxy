version: "3.9"

services:
  redis:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: redis
    restart: unless-stopped
    ulimits:
      memlock: -1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2"

  backend1:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: backend1
    restart: unless-stopped
    environment:
      BACKEND_NAME: backend1
      PORT: "5678"
      REDIS_ADDR: redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5678/"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  backend2:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: backend2
    restart: unless-stopped
    environment:
      BACKEND_NAME: backend2
      PORT: "5678"
      REDIS_ADDR: redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5678/"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  backend3:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: backend3
    restart: unless-stopped
    environment:
      BACKEND_NAME: backend3
      PORT: "5678"
      REDIS_ADDR: redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5678/"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sticky-proxy
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      REDIS_ADDR: "redis:6379"
      JWT_SECRET: "mysecret"
      PROXY_PORT: "8080"
    depends_on:
      redis:
        condition: service_healthy
      backend1:
        condition: service_healthy
      backend2:
        condition: service_healthy
      backend3:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
