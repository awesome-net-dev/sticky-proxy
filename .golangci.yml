version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gocritic
    - misspell
    - prealloc
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
  exclusions:
    paths:
      - vendor

formatters:
  enable:
    - gofmt
