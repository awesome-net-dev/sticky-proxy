apiVersion: v1
kind: ServiceAccount
metadata:
  name: sticky-proxy
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: endpointslice-reader
rules:
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sticky-proxy-endpointslice-reader
subjects:
  - kind: ServiceAccount
    name: sticky-proxy
roleRef:
  kind: Role
  name: endpointslice-reader
  apiGroup: rbac.authorization.k8s.io
