version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stickyproxy
      POSTGRES_USER: stickyproxy
      POSTGRES_PASSWORD: stickyproxy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stickyproxy"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  backend1:
    build:
      context: .
      dockerfile: backend.Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_NAME: backend1
      PORT: "5678"
      POSTGRES_DSN: "postgres://stickyproxy:stickyproxy@postgres:5432/stickyproxy?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5678/"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sticky-proxy
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "6060:6060"
    environment:
      JWT_SECRET: "mysecret"
      PROXY_PORT: "8080"
      ROUTING_MODE: "assignment"
      ASSIGNMENT_STORE: "postgres"
      POSTGRES_DSN: "postgres://stickyproxy:stickyproxy@postgres:5432/stickyproxy?sslmode=disable"
      ACCOUNTS_DISCOVERY: "postgres"
      ACCOUNTS_QUERY: "SELECT id, weight FROM accounts"
      ACCOUNTS_REFRESH_INTERVAL: "10s"
      BACKEND_DISCOVERY: "dns"
      BACKEND_DISCOVERY_HOST: "backend1"
      PUBLIC_PATHS: "/login"
      HOOKS_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      backend1:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
